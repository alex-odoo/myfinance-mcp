services:
  app:
    build: .
    container_name: myfinance-mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:8788:8788"
    env_file:
      # format:raw prevents compose from interpolating "$" inside the argon2 hash
      - path: app.env
        format: raw
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:8788/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
