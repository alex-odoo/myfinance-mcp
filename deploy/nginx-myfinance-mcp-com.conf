# myfinance-mcp.com - canonical product domain. Installed to
# /etc/nginx/sites-available/myfinance-mcp-com by deploy.sh.
# TLS blocks are added by certbot --nginx on first provision.
# finance.rteam.agency stays alive in parallel (existing connectors).

server {
    listen 80;
    listen [::]:80;
    server_name myfinance-mcp.com;

    client_max_body_size 1m;

    # Ignored by browsers over plain HTTP; carried into the 443 block when certbot copies it
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; frame-ancestors 'none'" always;

    # OAuth endpoints: tight limit (login brute force, token grinding)
    location ~ ^/(login|token|authorize|register|revoke)$ {
        limit_req zone=financemcp_auth burst=10 nodelay;
        proxy_pass http://127.0.0.1:8788;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MCP endpoint: streaming-friendly
    location /mcp {
        limit_req zone=financemcp_mcp burst=40 nodelay;
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    include /opt/myfinance-mcp/deploy/nginx-landing-locations.conf;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.myfinance-mcp.com;
    return 301 https://myfinance-mcp.com$request_uri;
}
