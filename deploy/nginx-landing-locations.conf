# Landing locations for the MyFinance MCP vhost.
# Included from the server{} block in place of the old catch-all proxy.
# /mcp and the OAuth endpoints keep their own location blocks in the vhost;
# everything the container still needs at root level is proxied explicitly here.

# Static server card (SEP-1649): lets Smithery and other directory scanners
# read capabilities without OAuth. Exact match wins over the proxied prefix.
location = /.well-known/mcp/server-card.json {
    root /opt/myfinance-mcp/site;
    default_type application/json;
}

# OAuth discovery: MCP clients fetch these before connecting. Breaking this
# breaks every connector, so it stays proxied.
location /.well-known/ {
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /health {
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Future public aggregate counters for the landing stats section.
# Proxied now so shipping the endpoint later needs no nginx change;
# the landing hides the section while this returns 404.
location = /api/stats {
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Bank consent return leg (Enable Banking redirects the user's browser here).
location /connect/ {
    limit_req zone=financemcp_auth burst=10 nodelay;
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Google sign-in (part of the OAuth login flow, same tight limit as /login).
location /auth/ {
    limit_req zone=financemcp_auth burst=10 nodelay;
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Static landing (repo site/, rsynced by deploy.sh).
# $uri/index.html before $uri/ serves /mint-mcp etc. directly (no 301 to
# the trailing-slash form), matching the slashless canonical URLs.
# html/css/js: no-cache = revalidate via ETag on every load (cheap 304s,
# no stale-asset bugs after deploys). Media and fonts: 7-day cache.
location ~* \.(css|js)$ {
    root /opt/myfinance-mcp/site;
    add_header Cache-Control "no-cache";
    try_files $uri =404;
}
location ~* \.(woff2|mp4|webm|jpg|jpeg|png|svg|ico|vtt)$ {
    root /opt/myfinance-mcp/site;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
}
# Bare-domain MCP requests: users paste https://myfinance-mcp.com (no /mcp)
# into their AI client; OAuth still completes (discovery is host-level) and the
# client then talks MCP to "/". The landing has no forms and never legitimately
# receives POST or an SSE-accepting GET, so re-route exactly those to /mcp.
# Browser GET / keeps serving the landing below.
location = / {
    if ($request_method = POST) { rewrite ^ /mcp last; }
    if ($http_accept ~* "text/event-stream") { rewrite ^ /mcp last; }
    root /opt/myfinance-mcp/site;
    add_header Cache-Control "no-cache";
    try_files /index.html =404;
}

location / {
    root /opt/myfinance-mcp/site;
    index index.html;
    add_header Cache-Control "no-cache";
    try_files $uri $uri/index.html $uri/ =404;
}
