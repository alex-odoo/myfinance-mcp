# Landing locations for the MyFinance MCP vhost.
# Included from the server{} block in place of the old catch-all proxy.
# /mcp and the OAuth endpoints keep their own location blocks in the vhost;
# everything the container still needs at root level is proxied explicitly here.

# OAuth discovery: MCP clients fetch these before connecting. Breaking this
# breaks every connector, so it stays proxied.
location /.well-known/ {
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /health {
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Future public aggregate counters for the landing stats section.
# Proxied now so shipping the endpoint later needs no nginx change;
# the landing hides the section while this returns 404.
location = /api/stats {
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Static landing (repo site/, rsynced by deploy.sh).
location / {
    root /opt/myfinance-mcp/site;
    index index.html;
    try_files $uri $uri/ =404;
}
