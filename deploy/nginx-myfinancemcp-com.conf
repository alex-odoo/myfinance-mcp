# myfinancemcp.com - hyphenless defensive twin. Permanent redirect to the
# canonical domain. Installed to /etc/nginx/sites-available/myfinancemcp-com
# by deploy.sh; certbot --nginx adds the TLS block on first provision.

server {
    listen 80;
    listen [::]:80;
    server_name myfinancemcp.com www.myfinancemcp.com;
    return 301 https://myfinance-mcp.com$request_uri;
}
