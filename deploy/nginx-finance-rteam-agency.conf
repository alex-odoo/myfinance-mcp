# FinanceMCP vhost. Installed to /etc/nginx/sites-available/finance-rteam-agency
# by deploy.sh. TLS blocks are added by certbot --nginx on first provision.
server {
    listen 80;
    listen [::]:80;
    server_name finance.rteam.agency;

    client_max_body_size 1m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; frame-ancestors 'none'" always;

    # OAuth endpoints: tight limit (login brute force, token grinding)
    location ~ ^/(login|token|authorize|register|revoke)$ {
        limit_req zone=financemcp_auth burst=10 nodelay;
        proxy_pass http://127.0.0.1:8788;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MCP endpoint: streaming-friendly
    location /mcp {
        limit_req zone=financemcp_mcp burst=40 nodelay;
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8788;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
